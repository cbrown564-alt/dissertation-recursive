version: 2026-05-13-final-clarification-v1
purpose: >
  Controlled final clarification matrix for separating prompt artefacts,
  architecture family, model capability, projection policy, and temporality
  challenge slices.

models:
  frontier:
    - gpt_5_5
    - gpt_5_4_mini
    - gpt_4_1_mini_baseline
    - gemini_3_flash
  local:
    - qwen_27b_local
    - qwen_35b_local
    - gemma_4b_local

model_registry_aliases:
  gemini_3_flash: gemini_3_1_flash

prompt_styles:
  - internal
  - clinician

harnesses:
  single_pass:
    - H6_benchmark_only_coarse_json
    - H6fs_benchmark_only_coarse_json
    - H6full_benchmark_coarse_json
  two_pass:
    - H7_extract_then_normalize
    - D3_candidate_plus_verifier
  evidence_resolution:
    - H6fs_ev_resolver

projection_policies:
  relaxed_projection:
    description: Current projected_canonical policy; permits deterministic normalization and force-current canonical shape.
    require_present_evidence: false
    report_projection_delta: true
  evidence_required_projection:
    description: Evidence-bearing projection for harnesses that emit quotes; drops unsupported quoted fields when configured.
    require_present_evidence: true
    report_projection_delta: true

evaluation_slices:
  standard_validation:
    split: validation
    minimum_documents: 40
  temporality_challenge:
    source: runs/temporality_challenge_set/validation/temporality_challenge_rows.csv
    categories:
      - planned_medication
      - previous_medication
      - taper_or_stop
      - dose_escalation
      - prn_medication
      - split_dose
      - seizure_free_historical_type
  projection_delta:
    source: runs/projection_delta_report/final_full_field_validation/projection_delta_rows.csv

required_outputs:
  - raw_response
  - raw_output_score_rows
  - raw_output_score_summary
  - parsed_payload
  - canonical_projection
  - projection_delta_rows
  - schema_validity
  - parse_success
  - latency
  - token_usage
  - estimated_cost
  - quote_validity
  - evidence_support
  - failure_categories

selected_run_plan:
  version: 2026-05-13-final-clarification-downselect-v1
  purpose: >
    Pragmatic 40-document down-selection from the full factorial skeleton. The
    plan preserves the major causal contrasts while avoiding a 168-condition
    run before the most informative axes have been tested.
  documents_per_condition: 40
  document_slice:
    split: validation
    selection: stratified_fixed_seed
    seed: 58
    minimum_temporality_documents: 20
    minimum_standard_validation_documents: 40
    notes: >
      Prefer the standard 40-document validation slice, replacing documents
      only as needed to guarantee temporality challenge coverage without
      exceeding 40 documents.
  token_estimates_per_document:
    H6_benchmark_only_coarse_json:
      calls_per_document: 1
      input_tokens: 4200
      output_tokens: 800
    H6fs_benchmark_only_coarse_json:
      calls_per_document: 1
      input_tokens: 4700
      output_tokens: 900
    H6full_benchmark_coarse_json:
      calls_per_document: 1
      input_tokens: 5400
      output_tokens: 1200
    H7_extract_then_normalize:
      calls_per_document: 2
      input_tokens: 7800
      output_tokens: 1600
    D3_candidate_plus_verifier:
      calls_per_document: 2
      input_tokens: 8200
      output_tokens: 1500
    H6fs_ev_resolver:
      calls_per_document: 2
      input_tokens: 6100
      output_tokens: 1050
  conditions:
    - id: FC01
      tier: core_architecture
      model: gpt_5_4_mini
      harness: H6fs_benchmark_only_coarse_json
      prompt_style: clinician
      projection_policy: relaxed_projection
      rationale: Compact frontier baseline for benchmark-only extraction.
    - id: FC02
      tier: core_architecture
      model: gpt_5_4_mini
      harness: H7_extract_then_normalize
      prompt_style: clinician
      projection_policy: relaxed_projection
      rationale: Frontier extract-then-normalize contrast against FC01.
    - id: FC03
      tier: core_architecture
      model: gpt_5_4_mini
      harness: D3_candidate_plus_verifier
      prompt_style: clinician
      projection_policy: relaxed_projection
      rationale: Frontier candidate-plus-verifier contrast against FC01.
    - id: FC04
      tier: core_architecture
      model: qwen_35b_local
      harness: H6fs_benchmark_only_coarse_json
      prompt_style: clinician
      projection_policy: relaxed_projection
      rationale: Strong local benchmark-only baseline.
    - id: FC05
      tier: core_architecture
      model: qwen_35b_local
      harness: H7_extract_then_normalize
      prompt_style: clinician
      projection_policy: relaxed_projection
      rationale: Local extract-then-normalize contrast against FC04.
    - id: FC06
