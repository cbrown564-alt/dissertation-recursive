version: 2026-05-07-stage-a-priced
currency: USD
pricing_snapshot_date: 2026-05-07
sdk_snapshot_date: 2026-05-07
notes:
  - Study labels are stable dissertation labels, not provider API constants.
  - Prices are per 1M tokens in USD unless otherwise noted.
  - Standard synchronous API pricing is recorded for the primary cost estimate.
  - Prompt/cache storage, tools, search grounding, regional/data-residency uplifts, and batch/flex/priority discounts are noted but not included in the base estimate.
  - OpenAI study entries use dated snapshot IDs where the official model page lists them.
  - Anthropic states Claude 4.6 dateless IDs are pinned snapshots rather than evergreen aliases.
  - Gemini 3.1 Pro is a preview model; Gemini 3 Flash is the official text Flash model matching the requested Flash role.
sources:
  openai_models: https://developers.openai.com/api/docs/models
  openai_pricing: https://developers.openai.com/api/docs/pricing
  anthropic_models: https://platform.claude.com/docs/en/about-claude/models/overview
  anthropic_pricing: https://platform.claude.com/docs/en/about-claude/pricing
  google_models: https://ai.google.dev/gemini-api/docs/gemini-3
  google_pricing: https://ai.google.dev/gemini-api/docs/pricing
  sdk_versions: "pip index versions on 2026-05-07"
